image:
  name: alpine/git:latest
  entrypoint: [""]

default:
  tags:
    - docker

stages:
  - sync


# =========================
# 1️⃣ GitLab master → GitHub feat/cicd_test
# =========================
sync_master_to_github:
  stage: sync
  variables:
    GITHUB_REPO_PATH: "LianjiaTech/bella-openapi"
    SOURCE_BRANCH: "master"
    TARGET_BRANCH: "feat/cicd_test"
    GIT_USER_NAME: "chenzhenhua016"
    GIT_USER_EMAIL: "chenzhenhua016@ke.com"

  script:
    - echo "======== master → GitHub feat/cicd_test (mirror sync) ========"

    - git config user.name "${GIT_USER_NAME}"
    - git config user.email "${GIT_USER_EMAIL}"

    # =========================
    # 🔥 关键修复：强制拉取最新 master
    # =========================
    - echo "获取最新 GitLab master..."
    - git fetch origin master
    - git checkout master
    - git reset --hard origin/master

    - echo "当前 HEAD："
    - git rev-parse HEAD

    - echo "配置 GitHub remote..."
    - git remote remove github || true
    - git remote add github "https://oauth2:${GITHUB_ACCESS_TOKEN}@github.com/${GITHUB_REPO_PATH}.git"

    - echo "开始镜像同步到 GitHub..."
    - git push github HEAD:${TARGET_BRANCH} --force-with-lease

    - echo "✅ GitHub 同步完成"

  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never


# =========================
# 2️⃣ GitLab dev → GitLab feat/cicd_test
# =========================
sync_dev_to_gitlab:
  stage: sync
  variables:
    TARGET_GITLAB_REPO_PATH: "ai-arch/bella-openapi"
    SOURCE_BRANCH: "dev"
    TARGET_BRANCH: "feat/cicd_test"
    GIT_USER_NAME: "chenzhenhua016"
    GIT_USER_EMAIL: "chenzhenhua016@ke.com"

  script:
    - echo "======== dev → GitLab feat/cicd_test (mirror sync) ========"

    - git config user.name "${GIT_USER_NAME}"
    - git config user.email "${GIT_USER_EMAIL}"

    # =========================
    # 🔥 关键修复：强制拉取最新 dev
    # =========================
    - echo "获取最新 GitLab dev..."
    - git fetch origin dev
    - git checkout dev
    - git reset --hard origin/dev

    - echo "当前 HEAD："
    - git rev-parse HEAD

    - echo "配置目标 GitLab remote..."
    - git remote remove target || true
    - git remote add target "https://oauth2:${GITLAB_ACCESS_TOKEN}@git.lianjia.com/${TARGET_GITLAB_REPO_PATH}.git"

    - echo "开始镜像同步到 GitLab..."
    - git push target HEAD:${TARGET_BRANCH} --force-with-lease

    - echo "✅ GitLab 同步完成"

  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never