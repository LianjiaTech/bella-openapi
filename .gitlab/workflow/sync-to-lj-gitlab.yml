sync_master_to_lj_gitlab:
  stage: sync

  variables:
    TARGET_GITLAB_REPO_PATH: "ai-arch/bella-openapi"
    SOURCE_BRANCH: "master"
    TARGET_BRANCH: "master"
    GIT_USER_NAME: "GitLab CI Bot"
    GIT_USER_EMAIL: "CIBot@ke.com"

  script:
    - echo "======== ${SOURCE_BRANCH} -> lj gitlab ${TARGET_BRANCH} ========"
    - git config user.name "${GIT_USER_NAME}"
    - git config user.email "${GIT_USER_EMAIL}"

    - echo "获取最新 ${SOURCE_BRANCH}..."
    - git fetch origin ${SOURCE_BRANCH}
    - git checkout ${SOURCE_BRANCH}
    - git reset --hard origin/${SOURCE_BRANCH}

    - echo "当前 HEAD:"
    - git rev-parse HEAD

    - echo "配置目标 gitlab remote..."
    - git remote remove target || true
    - git remote add target "https://oauth2:${GITLAB_ACCESS_TOKEN}@git.lianjia.com/${TARGET_GITLAB_REPO_PATH}.git"

    - echo "开始同步到 lj gitlab..."
    - git rm --cached .gitlab-ci.yml
    - git rm -r --cached .gitlab || true
    - git commit --amend --no-edit --no-verify
    - git push target HEAD:${TARGET_BRANCH} --force
    - git reset --hard origin/${SOURCE_BRANCH}
    - echo "✅ dev -> lj gitlab completed"

  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
      when: on_success

    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always

    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always

    - when: never


